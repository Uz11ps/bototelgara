greeting:
  start: |
    Добро пожаловать в премиальный отель GORA в Сортавала, Карелия.
    Я ваш персональный Telegram‑консьерж. С удовольствием позабочусь о вашем пребывании.

menus:
  segment_choice_prompt: "Пожалуйста, выберите, на каком этапе вы находитесь:"
  pre_arrival_title: "Выберите интересующий раздел (до заезда):"
  in_house_title: "Выберите услугу во время проживания:"

pre_arrival:
  book_room: "Для бронирования номера воспользуйтесь официальным сайтом отеля или свяжитесь с администратором."
  rooms_prices: "Актуальные категории номеров и цены доступны на сайте отеля."
  about_hotel: "GORA — камерный премиальный отель в Карелии, созданный для спокойного и бережного отдыха."
  events_banquets: "Мы организуем камерные мероприятия и банкеты. Напишите администратору для персонального предложения."
  how_to_get: "Подробная схема проезда и варианты трансфера доступны по ссылке на сайте отеля."
  faq: "Откройте раздел FAQ на сайте отеля, чтобы посмотреть ответы на частые вопросы."
  restaurant: "Ресторан на территории отеля будет запущен к маю 2026 года. Сейчас мы можем предложить только завтраки с доставкой в номер."
  contact_admin: "Для связи с администратором напишите нам в этом чате, и мы ответим в ближайшее время."

in_house:
  walks_relax: "Мы с удовольствием порекомендуем прогулки и места для отдыха неподалёку. Напишите, что вам ближе — прогулки, природа или экскурсии."
  restaurant: "Ресторан на территории отеля будет запущен к маю 2026 года. Сейчас доступны только завтраки с доставкой в номер."
  recommendations: "Расскажите, что вам интересно — мы подберём для вас персональные рекомендации."
  admin: "Напишите ваш вопрос или запрос — администратор свяжется с вами в ближайшее время."
  additional_services: "Дополнительные услуги отеля (трансфер, особые поводы, услуги для детей) доступны по запросу у администратора."

room_service:
  what_do_you_need: "Что вам нужно? Пожалуйста, выберите подходящий раздел."
  technical_problem:
    prompt_category: "Опишите, пожалуйста, тип технической проблемы (отопление, вода, электричество, Wi‑Fi, оборудование)."
    prompt_details: "При желании добавьте подробности (номер комнаты, время, что именно произошло)."
    summary: "Техническая проблема. Категория: {category}. Детали: {details}."
  extra_to_room:
    prompt_item: "Что принести в номер? Например: вода, чай, капсулы для кофе."
    prompt_quantity: "Укажите, пожалуйста, количество."
    summary: "Дополнительно в номер: {item}, количество: {quantity}."
  cleaning:
    prompt_time: "Выберите удобный слот для уборки (доступно с 09:00 до 16:30)."
    prompt_comments: "При необходимости добавьте комментарии к уборке (зоны, особенности, пожелания)."
    summary: "Уборка номера {room_number}. Время: {cleaning_time}. Комментарии: {comments}."
  pillow_menu:
    prompt_choice: "Какую подушку вы предпочитаете: ортопедическую, с эффектом памяти, мягкую или гипоаллергенную?"
    summary: "Запрос из меню подушек. Предпочтение гостя: {choice}."
  other:
    prompt_text: "Опишите, пожалуйста, ваш запрос — мы постараемся помочь."
    summary: "Другое обращение в рум‑сервис: {text}."
    
  # Ресторан и завтраки
breakfast:
  intro: "Заказ завтрака доступен ежедневно с 09:00 до 17:45."
  too_late: "К сожалению, сейчас заказать завтрак нельзя. Время приема заказов: с 09:00 до 17:45. Желаете связаться с администратором?"
  ask_persons: "На сколько человек заказать завтрак?"
  invalid_persons: "Пожалуйста, введите корректное количество человек (от 1 до 10)."
  confirm_prompt: "Вы заказываете завтрак на {persons} чел. Сумма: {total_price}₽. Подтверждаете?"
  ticket_summary: "Заказ завтрака на {persons} человек. Итого: {total_price}₽."
  order_final_confirmation: |
    ✅ <b>Ваш завтрак успешно заказан!</b>
    
    🎫 Номер заказа: #{ticket_id}
    👥 Количество персон: {persons}
    💰 Сумма: {total_price}₽
    ⏰ Доставка: 09:00–10:00
    
    🍳 <b>Состав завтрака «Шведский стол»:</b>
    • Свежая выпечка и хлеб
    • Мясная и сырная нарезка
    • Яичница / омлет
    • Каши на выбор
    • Свежие овощи и фрукты
    • Йогурты и творожки
    • Чай, кофе, соки
    
    Приятного аппетита! 🌟
  order_cancelled: "Заказ отменен."
  after_deadline_cancelled: "Запрос отменен."
  after_deadline_ticket_summary: "Запрос завтрака после дедлайна."
  composition: |
    🍳 <b>Состав завтрака «Шведский стол»</b> (650₽/чел.)
    
    • Свежая выпечка и хлеб
    • Мясная и сырная нарезка
    • Яичница / омлет
    • Каши на выбор (овсяная, рисовая, пшенная)
    • Свежие овощи и фрукты
    • Йогурты и творожки
    • Чай, кофе, соки
    
    ⏰ Время завтраков: 08:00 — 10:00

  # Сезонная адаптация
seasons:
  spring: "🌱 <b>Весна в Карелии</b>: Время пробуждения природы, прогулок по Ладожским шхерам и первых прогулок на сапах."
  summer: "☀️ <b>Лето в Карелии</b>: Белые ночи, купание, прогулки на катерах и барбекю на берегу."
  autumn: "🍂 <b>Осень в Карелии</b>: Сбор грибов и ягод, золотая природа и уютные вечера в бане."
  winter: "❄️ <b>Зима в Карелии</b>: Снежные пейзажи, подледная рыбалка и жаркая баня на дровах."

system:
  content_reloaded: "Текстовое и меню‑содержимое обновлено."
  not_authorized: "Эта команда доступна только администратору отеля."
    
