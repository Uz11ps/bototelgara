menu:
  category_prompt: "🍽 Выберите категорию меню:"
  breakfast_unavailable: |
    К сожалению, заказать завтрак не получится.
    Возможное время заказа 9:00 - 17:45 ежедневно.
    
    Вы можете выбрать обед или ужин.
  no_items_in_category: "В этой категории пока нет доступных блюд."
  guest_comment_prompt: |
    💬 Есть комментарии или пожелания к заказу?
    
    Напишите их или отправьте "нет" если комментариев нет.
  order_confirmed: |
    ✅ <b>Ваш заказ принят!</b>
    
    Номер заказа: #{ticket_id}
    Итого: {total}₽
    
    Мы свяжемся с вами для уточнения времени доставки.

cleaning:
  schedule_prompt: |
    🧹 Добрый день!
    
    Во сколько сегодня для Вас будет удобно провести уборку номера?
  time_confirmed: |
    ✅ Спасибо! Уборка запланирована на {time_slot}.
    
    Если планы изменятся, вы всегда можете заказать уборку через меню "Рум-сервис".
  not_needed_confirmed: "✅ Хорошо, уборка сегодня не требуется. Хорошего дня!"

notifications:
  check_in_welcome: |
    🏠 <b>Добро пожаловать в GORA!</b>
    
    Мы зарегистрировали ваше проживание в номере {room_number}.
    
    🔑 <b>Wi-Fi в отеле:</b>
    Сеть: <code>GORA_HOTEL_GUEST</code>
    Пароль: <code>gora2024</code>
    
    ☕ Завтраки проходят с 08:00 до 10:00 в ресторане на 1 этаже.
    
    Если вам понадобится помощь, уборка или рум-сервис, просто выберите нужный раздел в меню бота.
  check_out_reminder: |
    🧳 <b>Напоминание о выезде</b>
    
    Сегодня у вас запланирован выезд из номера {room_number}.
    Спасибо, что выбрали GORA!
    
    Если нужна помощь с выездом или нужно заказать такси, нажмите кнопку связи с администратором.
  check_out_feedback: |
    🌟 Будем очень благодарны, если вы поделитесь впечатлениями о проживании.
    
    Нажмите кнопку ниже, чтобы оставить отзыв.
  feedback_request: |
    Мы надеемся, что ваше пребывание в GORA было приятным!
    Будем благодарны, если вы уделите 2 минуты и сначала оцените проживание и поделитесь впечатлениями.

guest_booking:
  room_prompt: "🏠 Укажите номер вашей комнаты:"
  check_in_prompt: "📅 Введите дату заезда (в формате ДД.ММ.ГГГГ):"
  check_out_prompt: "📅 Введите дату выезда (в формате ДД.ММ.ГГГГ):"
  booking_saved: |
    ✅ Данные сохранены!
    
    Заезд: {check_in}
    Выезд: {check_out}
    
    Теперь вам будут приходить уведомления об уборке номера.
